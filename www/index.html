<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renault Scenic III — Журнал ТО</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0B0E11;
  --bg-card: #13171C;
  --bg-input: #0B0E11;
  --bg-hover: #1A1F25;
  --border: #1E2328;
  --border-light: #2A2F36;
  --text-primary: #E8ECEF;
  --text-secondary: #8B9299;
  --text-muted: #6B7280;
  --accent: #EFBF04;
  --accent-hover: #F4D03F;
  --accent-dark: #D4A017;
  --danger: #FF2D55;
  --warning: #FF9500;
  --success: #34C759;
  --font-main: 'Montserrat', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 7px;
  --radius-pill: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-main);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
@keyframes scaleIn {
  from { opacity: 0; transform: scale(.95); }
  to { opacity: 1; transform: scale(1); }
}

.app { max-width: 860px; margin: 0 auto; padding-bottom: 40px; }

/* ═══════ HEADER ═══════ */
.header {
  background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-primary) 100%);
  border-bottom: 1px solid var(--border);
  padding-top: 18px;
  position: sticky; top: 0; z-index: 50;
}
.header-top {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 18px 10px; gap: 10px;
}
.logo-block { display: flex; align-items: center; gap: 10px; }
.diamond {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dark));
  transform: rotate(45deg);
  display: flex; align-items: center; justify-content: center;
  border-radius: 5px; flex-shrink: 0;
}
.diamond span { transform: rotate(-45deg); font-size: 14px; color: var(--bg-primary); font-weight: 800; }
.brand { font-size: 14px; font-weight: 800; letter-spacing: .08em; color: #F5F5F5; }
.subtitle { font-size: 9px; color: var(--text-muted); letter-spacing: .03em; text-transform: uppercase; margin-top: 1px; }

.header-actions { display: flex; gap: 6px; align-items: center; }
.btn-add {
  background: var(--accent); color: var(--bg-primary); border: none;
  border-radius: var(--radius-sm); padding: 8px 14px;
  font-weight: 700; font-size: 12px; cursor: pointer;
  font-family: var(--font-main); transition: background .2s;
}
.btn-add:hover { background: var(--accent-hover); }
.btn-reset {
  background: transparent; color: var(--text-secondary);
  border: 1px solid var(--border-light); border-radius: var(--radius-sm);
  padding: 8px 10px; font-size: 11px; cursor: pointer; transition: background .2s;
}
.btn-reset:hover { background: var(--border-light); }

/* ═══════ CONTROLS BAR ═══════ */
.controls-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 18px 8px; gap: 10px; flex-wrap: wrap;
}
.mileage-group { display: flex; align-items: center; gap: 8px; }
.mileage-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
.mileage-btn {
  background: var(--bg-hover); border: 1px solid var(--border-light);
  border-radius: 6px; padding: 4px 10px; color: var(--accent);
  font-family: var(--font-mono); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
}
.mileage-btn:hover { border-color: var(--accent); }

.toggle-group {
  display: flex; background: var(--bg-hover); border-radius: 6px;
  border: 1px solid var(--border-light); overflow: hidden;
}
.toggle-btn {
  background: none; border: none; padding: 5px 11px;
  color: var(--text-muted); font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: var(--font-main);
}
.toggle-btn.active { background: var(--accent); color: var(--bg-primary); }

/* ═══════ DRIVING MODE ═══════ */
.mode-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 18px 8px; flex-wrap: wrap;
}
.mode-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
.mode-group {
  display: flex; background: var(--bg-hover); border-radius: 6px;
  border: 1px solid var(--border-light); overflow: hidden;
}
.mode-btn {
  background: none; border: none; padding: 5px 12px;
  color: var(--text-muted); font-size: 10px; font-weight: 600;
  cursor: pointer; transition: all .2s; font-family: var(--font-main);
  white-space: nowrap;
}
.mode-btn.active { background: #2980B9; color: #fff; }
.mode-hint {
  font-size: 9px; color: var(--text-muted); font-style: italic;
  padding: 0 18px 6px;
}

/* ═══════ ALERT STRIP ═══════ */
.alert-strip { display: flex; gap: 6px; padding: 0 18px 8px; flex-wrap: wrap; }
.alert-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 16px;
}
.alert-overdue { background: #FF2D5520; color: var(--danger); }
.alert-soon { background: #FF950020; color: var(--warning); }
.alert-unknown { background: #8B929920; color: var(--text-secondary); }

/* ═══════ TABS ═══════ */
.tabs {
  display: flex; padding: 0 18px; gap: 2px;
  border-top: 1px solid var(--border);
}
.tab {
  flex: 1; background: none; border: none;
  padding: 12px 0; color: var(--text-muted);
  font-size: 11px; font-weight: 600; cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .2s; position: relative;
  font-family: var(--font-main);
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-badge {
  position: absolute; top: 5px; right: 18%;
  background: var(--danger); color: #fff;
  font-size: 8px; font-weight: 800; border-radius: 8px;
  padding: 1px 4px; min-width: 14px; text-align: center;
}

/* ═══════ CONTENT ═══════ */
.content { padding: 16px 18px; }

/* ═══════ CHIPS ═══════ */
.chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
.chip {
  background: var(--bg-hover); border: 1px solid var(--border-light);
  border-radius: 16px; padding: 4px 10px; color: var(--text-secondary);
  font-size: 10px; font-weight: 600; cursor: pointer;
  transition: all .15s; font-family: var(--font-main);
}
.chip.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

/* ═══════ SERVICE CARD ═══════ */
.svc-list { display: flex; flex-direction: column; gap: 8px; }
.svc-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
  cursor: pointer; transition: all .15s;
  animation: slideIn .3s ease both;
}
.svc-card:hover { border-color: var(--border-light); }
.svc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.svc-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.status-badge {
  font-size: 8px; font-weight: 800; padding: 2px 7px;
  border-radius: 8px; letter-spacing: .04em; text-transform: uppercase;
}
.status-overdue { background: #FF2D5518; color: var(--danger); animation: blink 1.5s infinite; }
.status-soon { background: #FF950018; color: var(--warning); }
.status-upcoming { background: #EFBF0418; color: var(--accent); }
.status-ok { background: #34C75918; color: var(--success); }
.status-unknown { background: #8B929918; color: var(--text-secondary); }

.priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.svc-group-label { font-size: 10px; color: var(--text-muted); }
.svc-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
.svc-right { text-align: right; flex-shrink: 0; }
.svc-km {
  font-size: 12px; font-family: var(--font-mono); font-weight: 600;
}
.svc-interval { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.progress-track {
  height: 3px; background: var(--border); border-radius: 2px;
  overflow: hidden; margin-top: 8px;
}
.progress-fill {
  height: 100%; border-radius: 2px; transition: width .6s ease;
}

.svc-expanded {
  margin-top: 14px; border-top: 1px solid var(--border);
  padding-top: 14px; animation: fadeIn .2s;
}
.svc-note {
  font-size: 11px; color: var(--accent-dark); line-height: 1.5;
  padding: 8px 10px; background: #EFBF0408;
  border-radius: 6px; margin-bottom: 10px;
  border-left: 3px solid var(--accent);
}
.svc-details { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.svc-detail { display: flex; gap: 6px; font-size: 11px; color: #C8CDD2; flex-wrap: wrap; }
.svc-detail-label { color: var(--text-muted); min-width: 130px; flex-shrink: 0; }
.btn-mark-done {
  background: var(--bg-hover); border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); padding: 7px 14px;
  color: var(--success); font-size: 11px; font-weight: 600;
  cursor: pointer; width: 100%; transition: all .2s;
  font-family: var(--font-main);
}
.btn-mark-done:hover { background: var(--border-light); }

/* ═══════ RECORDS ═══════ */
.filters-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.search-input {
  flex: 2; min-width: 120px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 10px; color: var(--text-primary); font-size: 11px; outline: none;
  font-family: var(--font-main);
}
.filter-select {
  flex: 1; min-width: 80px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 8px 8px; color: var(--text-primary); font-size: 10px;
  outline: none; cursor: pointer; font-family: var(--font-main);
}

.records-list { display: flex; flex-direction: column; gap: 7px; }
.record {
  background: var(--bg-card); border-radius: 9px;
  padding: 12px 14px; cursor: pointer;
  border: 1px solid var(--border); transition: all .15s;
  animation: slideIn .3s ease both;
}
.record:hover { border-color: var(--border-light); }
.record-main { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.cat-badge {
  display: inline-block; font-size: 9px; font-weight: 600;
  padding: 2px 7px; border-radius: 14px;
}
.record-link { font-size: 10px; color: var(--text-muted); margin-left: 6px; }
.record-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-top: 4px; }
.record-notes {
  font-size: 12px; color: var(--text-secondary); margin-top: 8px;
  padding: 8px 12px; background: var(--bg-primary); border-radius: 6px;
  line-height: 1.5; animation: fadeIn .2s;
}
.record-cost {
  font-size: 14px; font-weight: 700; font-family: var(--font-mono); color: var(--accent);
}
.record-date { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.record-actions { display: flex; gap: 5px; margin-top: 8px; justify-content: flex-end; animation: fadeIn .2s; }
.btn-edit, .btn-delete {
  background: var(--border); border: 1px solid var(--border-light);
  border-radius: 5px; padding: 4px 9px; font-size: 10px; cursor: pointer;
}
.btn-edit { color: var(--text-primary); }
.btn-delete { color: var(--danger); }

.empty { text-align: center; padding: 50px 20px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty-text { color: var(--text-secondary); }

/* ═══════ STATS ═══════ */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 9px; padding: 14px;
}
.stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
.stat-value { font-size: 20px; font-weight: 800; font-family: var(--font-mono); margin-top: 4px; }
.cat-stats-list { display: flex; flex-direction: column; gap: 7px; }
.cat-stat-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 9px; padding: 12px 14px;
}
.section-title {
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px;
}

/* ═══════ MODAL ═══════ */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; animation: fadeIn .2s; padding: 16px;
}
.modal {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: 12px; width: 100%; max-width: 500px;
  max-height: 90vh; overflow: auto; animation: scaleIn .25s ease;
}
.mini-modal {
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: 12px; padding: 20px; width: 100%; max-width: 300px;
  animation: scaleIn .25s ease;
}
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 700; }
.btn-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 16px; cursor: pointer;
}
.form-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 14px 18px;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field-full { grid-column: 1 / -1; }
.field label {
  font-size: 9px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: .04em;
}
.field input, .field select, .field textarea {
  background: var(--bg-input); border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); padding: 8px 10px;
  color: var(--text-primary); font-size: 12px; outline: none;
  width: 100%; font-family: var(--font-main);
}
.field textarea { min-height: 55px; resize: vertical; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 18px; border-top: 1px solid var(--border);
}
.btn-cancel {
  background: none; border: 1px solid var(--border-light);
  border-radius: var(--radius-sm); padding: 8px 16px;
  color: var(--text-secondary); font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font-main);
}
.btn-save {
  background: var(--accent); border: none;
  border-radius: var(--radius-sm); padding: 8px 20px;
  color: var(--bg-primary); font-size: 11px; font-weight: 700;
  cursor: pointer; transition: all .2s; font-family: var(--font-main);
}
.btn-save:hover { background: var(--accent-hover); }
.btn-save:disabled { opacity: .4; cursor: not-allowed; }

.hidden { display: none !important; }

/* Responsive */
@media (max-width: 480px) {
  .header-top { flex-wrap: wrap; }
  .controls-bar { flex-direction: column; align-items: stretch; }
  .stats-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .field-full { grid-column: 1; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="logo-block">
        <div class="diamond"><span>◆</span></div>
        <div>
          <div class="brand">RENAULT SCENIC III</div>
          <div class="subtitle">Журнал ТО и регламент</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-reset" id="btnReset" onclick="clearAll()">🗑</button>
        <button class="btn-add" onclick="openForm()">+ Запись</button>
      </div>
    </div>

    <div class="controls-bar">
      <div class="mileage-group">
        <span class="mileage-label">Пробег:</span>
        <button class="mileage-btn" onclick="openMileageModal()" id="mileageDisplay">145 000 km ✏️</button>
      </div>
      <div class="toggle-group" id="engineToggle">
        <button class="toggle-btn active" data-val="diesel" onclick="setEngine('diesel')">Дизель</button>
        <button class="toggle-btn" data-val="petrol" onclick="setEngine('petrol')">Бензин</button>
      </div>
    </div>

    <div class="mode-bar">
      <span class="mode-label">Режим:</span>
      <div class="mode-group" id="modeToggle">
        <button class="mode-btn active" data-val="city" onclick="setMode('city')">🏙 Город</button>
        <button class="mode-btn" data-val="mixed" onclick="setMode('mixed')">🔀 Смешанный</button>
        <button class="mode-btn" data-val="highway" onclick="setMode('highway')">🛣 Трасса</button>
      </div>
    </div>
    <div class="mode-hint" id="modeHint">Город: интервалы сокращены на ~30% (сажа DPF, короткие поездки, пробки)</div>

    <div class="alert-strip" id="alertStrip"></div>

    <div class="tabs">
      <button class="tab active" data-tab="schedule" onclick="switchTab('schedule')">🔧 Регламент <span class="tab-badge hidden" id="overdueBadge">0</span></button>
      <button class="tab" data-tab="records" onclick="switchTab('records')">📋 Журнал</button>
      <button class="tab" data-tab="stats" onclick="switchTab('stats')">📊 Расходы</button>
    </div>
  </div>

  <div class="content" id="contentArea"></div>
</div>

<!-- Mileage Modal -->
<div class="overlay hidden" id="mileageModal" onclick="closeMileageModal()">
  <div class="mini-modal" onclick="event.stopPropagation()">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">Текущий пробег</div>
    <div class="field">
      <input type="number" id="mileageInput" style="font-size:20px;text-align:center;font-family:var(--font-mono)">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-cancel" onclick="closeMileageModal()">Отмена</button>
      <button class="btn-save" style="flex:1" onclick="saveMileage()">OK</button>
    </div>
  </div>
</div>

<!-- Record Form Modal -->
<div class="overlay hidden" id="formModal" onclick="closeForm()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="formTitle">Новая запись</span>
      <button class="btn-close" onclick="closeForm()">✕</button>
    </div>
    <div class="form-grid">
      <div class="field"><label>Дата</label><input type="date" id="fDate"></div>
      <div class="field"><label>Пробег (km)</label><input type="number" id="fMileage"></div>
      <div class="field"><label>Категория</label><select id="fCategory"></select></div>
      <div class="field"><label>Стоимость (lei)</label><input type="number" id="fCost" placeholder="0"></div>
      <div class="field field-full"><label>Привязка к регламенту</label><select id="fServiceId"></select></div>
      <div class="field field-full"><label>Описание работ</label><input type="text" id="fTitle" placeholder="Что сделано..."></div>
      <div class="field field-full"><label>Примечания</label><textarea id="fNotes" placeholder="Артикулы, бренды..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeForm()">Отмена</button>
      <button class="btn-save" id="btnSubmit" onclick="submitForm()">Добавить</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA & STATE
   ═══════════════════════════════════════════ */

const SERVICE_SCHEDULE = [
  // ENGINE
  { id:"oil_filter", group:"engine", name:"Моторное масло + масляный фильтр",
    km:{city:10000,mixed:12000,highway:15000}, mo:{city:9,mixed:12,highway:12},
    note:"ELF Evolution 900 SXR 5W-30 (дизель) / 5W-40 (бензин). Город: масло быстро насыщается сажей из-за DPF, солярка попадает в масло при прожигах. Оригинальный фильтр 152089599R", priority:"high" },
  { id:"air_filter", group:"engine", name:"Воздушный фильтр",
    km:{city:20000,mixed:25000,highway:30000}, mo:{city:18,mixed:24,highway:24},
    note:"Оригинал 165467674R. В городе забивается быстрее из-за пыли и смога. Проверять каждые 10 000 km", priority:"medium" },
  { id:"cabin_filter", group:"comfort", name:"Салонный фильтр (пыльцевой)",
    km:{city:10000,mixed:12000,highway:15000}, mo:{city:9,mixed:12,highway:12},
    note:"Оригинал 272773016R. Угольный фильтр рекомендуется для города — задерживает выхлопы", priority:"low" },
  { id:"fuel_filter_diesel", group:"engine", name:"Топливный фильтр (дизель)",
    km:{city:45000,mixed:50000,highway:60000}, mo:{city:36,mixed:42,highway:48},

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
const fmtDate = d => new Date(d).toLocaleDateString("ru-RU",{day:"numeric",month:"short",year:"numeric"});
const fmtCost = n => n.toLocaleString("ro-MD") + " lei";
const fmtKm = n => n.toLocaleString("ro-MD") + " km";
const fmtK = n => n.toLocaleString("ro-MD");

function getSchedule() {
  return SERVICE_SCHEDULE.filter(s => {
    if (state.engineType === "diesel" && s.id === "spark_plugs") return false;
    if (state.engineType === "petrol" && (s.id === "glow_plugs" || s.id === "fuel_filter_diesel")) return false;
    return true;
  });
}

function getStatuses() {
  const today = new Date().toISOString().slice(0,10);
  const mode = state.driveMode;
  return getSchedule().map(svc => {
    const kmInt = svc.km[mode], moInt = svc.mo[mode];
    const recs = state.records.filter(r => r.serviceId === svc.id).sort((a,b) => new Date(b.date)-new Date(a.date));
    const last = recs[0] || null;
    const kmSince = last ? state.currentMileage - last.mileage : state.currentMileage;
    const daysSince = last ? Math.round((new Date(today)-new Date(last.date))/86400000) : 9999;
    const moSince = daysSince / 30.44;
    const kmRem = last ? kmInt - (state.currentMileage - last.mileage) : 0;
    const moRem = last ? moInt - moSince : 0;
    let status = "ok", urgency = 0;
    if (kmRem <= 0 || moRem <= 0) { status = "overdue"; urgency = 3; }
    else if (kmRem <= kmInt*.15 || moRem <= moInt*.15) { status = "soon"; urgency = 2; }
    else if (kmRem <= kmInt*.3 || moRem <= moInt*.3) { status = "upcoming"; urgency = 1; }
    if (!last) { status = "unknown"; urgency = 2; }
    const nextKm = last ? last.mileage + kmInt : state.currentMileage;
    const nextDate = last ? new Date(new Date(last.date).getTime() + moInt*30.44*86400000).toISOString().slice(0,10) : today;
    return {...svc, kmInterval:kmInt, monthInterval:moInt, last, kmRemaining:kmRem, monthsRemaining:Math.round(moRem), status, urgency, nextAtKm:nextKm, nextByDate:nextDate, kmSinceLast:kmSince, daysSinceLast:daysSince};
  });
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
function render() {
  const statuses = getStatuses();
  const overdueN = statuses.filter(s=>s.status==="overdue").length;
  const soonN = statuses.filter(s=>s.status==="soon").length;
  const unknownN = statuses.filter(s=>s.status==="unknown").length;

  // Mileage display
  document.getElementById("mileageDisplay").textContent = fmtKm(state.currentMileage) + " ✏️";

  // Reset button
  document.getElementById("btnReset").classList.toggle("hidden", state.records.length === 0);

  // Mode hint
  document.getElementById("modeHint").textContent = MODE_HINTS[state.driveMode];

  // Alerts
  let alertHTML = "";
  if (overdueN) alertHTML += `<span class="alert-badge alert-overdue">⚠️ ${overdueN} просрочено</span>`;
  if (soonN) alertHTML += `<span class="alert-badge alert-soon">⏰ ${soonN} скоро</span>`;
  if (unknownN) alertHTML += `<span class="alert-badge alert-unknown">❓ ${unknownN} нет данных</span>`;
  document.getElementById("alertStrip").innerHTML = alertHTML;

  // Overdue badge
  const badge = document.getElementById("overdueBadge");
  if (overdueN > 0) { badge.textContent = overdueN; badge.classList.remove("hidden"); }
  else badge.classList.add("hidden");

  // Tabs
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === state.activeTab));

  // Engine toggle
  document.querySelectorAll("#engineToggle .toggle-btn").forEach(b => b.classList.toggle("active", b.dataset.val === state.engineType));

  // Mode toggle
  document.querySelectorAll("#modeToggle .mode-btn").forEach(b => b.classList.toggle("active", b.dataset.val === state.driveMode));

  // Content
  const area = document.getElementById("contentArea");
  if (state.activeTab === "schedule") renderSchedule(area, statuses);
  else if (state.activeTab === "records") renderRecords(area);
  else renderStats(area);
}

function renderSchedule(area, statuses) {
  const filtered = statuses
    .filter(s => state.scheduleFilter==="all" ? true : state.scheduleFilter==="attention" ? ["overdue","soon","unknown"].includes(s.status) : s.group===state.scheduleFilter)
    .sort((a,b) => b.urgency-a.urgency || a.kmRemaining-b.kmRemaining);

  const chips = [{id:"all",l:"Все"},{id:"attention",l:"⚠️ Внимание"},
    ...Object.entries(GROUPS).map(([id,g])=>({id,l:g.icon+" "+g.label}))];

  let html = `<div class="chips">${chips.map(c=>`<button class="chip ${state.scheduleFilter===c.id?"active":""}" onclick="setSchedFilter('${c.id}')">${c.l}</button>`).join("")}</div>`;
  html += `<div class="svc-list">`;

  filtered.forEach((svc,i) => {
    const st = STATUS_MAP[svc.status], grp = GROUPS[svc.group];
    const pct = svc.last ? Math.min(100, Math.max(0, (svc.kmSinceLast/svc.kmInterval)*100)) : 100;
    const bc = svc.status==="overdue"?"#FF2D55":svc.status==="soon"?"#FF9500":svc.status==="upcoming"?"#EFBF04":"#34C759";
    const stColor = {overdue:"#FF2D55",soon:"#FF9500",upcoming:"#EFBF04",ok:"#34C759",unknown:"#8B9299"}[svc.status];
    const isExp = state.expandedSvcId === svc.id;

    html += `<div class="svc-card" style="border-left:3px solid ${stColor};animation-delay:${i*.03}s" onclick="toggleSvc('${svc.id}')">`;
    html += `<div class="svc-top"><div style="flex:1;min-width:0">`;
    html += `<div class="svc-meta"><span class="status-badge ${st.cls}">${st.label}</span>`;
    html += `<span class="priority-dot" style="background:${PRIORITY_COLORS[svc.priority]}"></span>`;
    html += `<span class="svc-group-label">${grp.icon} ${grp.label}</span></div>`;
    html += `<div class="svc-name">${svc.name}</div></div>`;
    html += `<div class="svc-right"><div class="svc-km" style="color:${stColor}">${svc.status==="unknown"?"—":svc.kmRemaining<=0?"−"+fmtK(Math.abs(svc.kmRemaining))+" km":fmtK(svc.kmRemaining)+" km"}</div>`;
    html += `<div class="svc-interval">/${fmtK(svc.kmInterval)} km / ${svc.monthInterval} мес</div></div></div>`;
    html += `<div class="progress-track"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${bc}"></div></div>`;

    if (isExp) {
      html += `<div class="svc-expanded"><div class="svc-note">💡 ${svc.note}</div><div class="svc-details">`;
      if (svc.last) {
        html += `<div class="svc-detail"><span class="svc-detail-label">Последняя замена:</span><span>${fmtDate(svc.last.date)} при ${fmtKm(svc.last.mileage)}</span></div>`;
        html += `<div class="svc-detail"><span class="svc-detail-label">Следующая замена:</span><span>при ${fmtKm(svc.nextAtKm)} или до ${fmtDate(svc.nextByDate)}</span></div>`;
        html += `<div class="svc-detail"><span class="svc-detail-label">С последней замены:</span><span>${fmtKm(svc.kmSinceLast)} / ${Math.round(svc.daysSinceLast/30.44)} мес</span></div>`;
      } else {
        html += `<div style="color:#8B9299;font-style:italic;font-size:12px">Нет данных. Добавьте запись!</div>`;
      }
      html += `</div><button class="btn-mark-done" onclick="event.stopPropagation();addFromSchedule('${svc.id}')">✅ Записать выполнение</button></div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;
  area.innerHTML = html;
}

function renderRecords(area) {
  let recs = state.records
    .filter(r => state.filterCat==="all" || r.category===state.filterCat)
    .filter(r => !state.searchQuery || r.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || (r.notes && r.notes.toLowerCase().includes(state.searchQuery.toLowerCase())));
  if (state.sortBy==="date") recs.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if (state.sortBy==="cost") recs.sort((a,b)=>b.cost-a.cost);
  else recs.sort((a,b)=>b.mileage-a.mileage);

  let html = `<div class="filters-bar">
    <input class="search-input" placeholder="🔍 Поиск..." value="${state.searchQuery}" oninput="state.searchQuery=this.value;render()">
    <select class="filter-select" onchange="state.filterCat=this.value;render()">
      <option value="all" ${state.filterCat==="all"?"selected":""}>Все</option>
      ${CATEGORIES.map(c=>`<option value="${c.id}" ${state.filterCat===c.id?"selected":""}>${c.icon} ${c.label}</option>`).join("")}
    </select>
    <select class="filter-select" onchange="state.sortBy=this.value;render()">
      <option value="date" ${state.sortBy==="date"?"selected":""}>Дата</option>
      <option value="cost" ${state.sortBy==="cost"?"selected":""}>Цена</option>
      <option value="mileage" ${state.sortBy==="mileage"?"selected":""}>Пробег</option>
    </select>
  </div>`;

  if (!recs.length) {
    html += `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">Нет записей</div></div>`;
  } else {
    html += `<div class="records-list">`;
    recs.forEach((r,i) => {
      const cat = CATEGORIES.find(c=>c.id===r.category)||CATEGORIES[10];
      const isExp = state.expandedRecId === r.id;
      const ls = r.serviceId ? SERVICE_SCHEDULE.find(s=>s.id===r.serviceId) : null;

      html += `<div class="record" style="border-left:3px solid ${cat.color};animation-delay:${i*.03}s" onclick="toggleRec(${r.id})">`;
      html += `<div class="record-main"><div style="flex:1;min-width:0">`;
      html += `<span class="cat-badge" style="background:${cat.color}18;color:${cat.color}">${cat.icon} ${cat.label}</span>`;
      if (ls) html += `<span class="record-link">→ ${ls.name}</span>`;
      html += `<div class="record-title">${r.title}</div>`;
      if (isExp && r.notes) html += `<div class="record-notes">${r.notes}</div>`;
      html += `</div><div style="text-align:right;flex-shrink:0">`;
      html += `<div class="record-cost">${fmtCost(r.cost)}</div>`;
      html += `<div class="record-date">${fmtDate(r.date)}</div>`;
      html += `<div class="record-date">${fmtKm(r.mileage)}</div>`;
      if (isExp) html += `<div class="record-actions"><button class="btn-edit" onclick="event.stopPropagation();editRecord(${r.id})">✏️</button><button class="btn-delete" onclick="event.stopPropagation();deleteRecord(${r.id})">🗑</button></div>`;
      html += `</div></div></div>`;
    });
    html += `</div>`;
  }
  area.innerHTML = html;
}

function renderStats(area) {
  const total = state.records.reduce((s,r)=>s+r.cost,0);
  let html = `<div class="stats-grid">
    <div class="stat-box"><div class="stat-label">Всего</div><div class="stat-value" style="color:var(--accent)">${fmtCost(total)}</div></div>
    <div class="stat-box"><div class="stat-label">Записей</div><div class="stat-value">${state.records.length}</div></div>
  </div>`;
  html += `<div class="section-title">По категориям</div><div class="cat-stats-list">`;
  CATEGORIES.forEach(c => {
    const cr = state.records.filter(r=>r.category===c.id);
    if (!cr.length) return;
    const ct = cr.reduce((s,r)=>s+r.cost,0);
    const pct = total ? (ct/total)*100 : 0;
    html += `<div class="cat-stat-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:18px">${c.icon}</span>
        <span style="font-size:12px;font-weight:600;flex:1">${c.label}</span>
        <span style="font-size:10px;color:var(--text-muted)">${cr.length} зап.</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-family:var(--font-mono);font-size:12px">
        <span style="color:${c.color};font-weight:700">${fmtCost(ct)}</span>
        <span style="color:var(--text-muted);font-size:11px">${pct.toFixed(1)}%</span>
      </div>
    </div>`;
  });
  html += `</div>`;
  area.innerHTML = html;
}

/* ═══════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════ */
function switchTab(t) { state.activeTab = t; render(); }
function setEngine(t) { state.engineType = t; render(); }
function setMode(m) { state.driveMode = m; render(); }
function setSchedFilter(f) { state.scheduleFilter = f; render(); }
function toggleSvc(id) { state.expandedSvcId = state.expandedSvcId===id ? null : id; render(); }
function toggleRec(id) { state.expandedRecId = state.expandedRecId===id ? null : id; render(); }

function clearAll() { if(confirm("Очистить все записи?")) { state.records=[]; render(); } }

function openMileageModal() {
  document.getElementById("mileageInput").value = state.currentMileage;
  document.getElementById("mileageModal").classList.remove("hidden");
}
function closeMileageModal() { document.getElementById("mileageModal").classList.add("hidden"); }
function saveMileage() {
  const v = parseInt(document.getElementById("mileageInput").value);
  if (v > 0) state.currentMileage = v;
  closeMileageModal(); render();
}

function populateFormSelects() {
  const catSel = document.getElementById("fCategory");
  catSel.innerHTML = CATEGORIES.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join("");
  const svcSel = document.getElementById("fServiceId");
  svcSel.innerHTML = `<option value="">— без привязки —</option>` +
    getSchedule().map(s => `<option value="${s.id}">${GROUPS[s.group]?.icon||""} ${s.name}</option>`).join("");
}

function openForm(presets) {
  state.editingId = null;
  populateFormSelects();
  document.getElementById("fDate").value = new Date().toISOString().slice(0,10);
  document.getElementById("fMileage").value = state.currentMileage;
  document.getElementById("fCategory").value = presets?.category || "oil";
  document.getElementById("fCost").value = presets?.cost || "";
  document.getElementById("fServiceId").value = presets?.serviceId || "";
  document.getElementById("fTitle").value = presets?.title || "";
  document.getElementById("fNotes").value = presets?.notes || "";
  document.getElementById("formTitle").textContent = "Новая запись";
  document.getElementById("btnSubmit").textContent = "Добавить";
  document.getElementById("formModal").classList.remove("hidden");
}

function closeForm() { document.getElementById("formModal").classList.add("hidden"); }

function editRecord(id) {
  const r = state.records.find(x=>x.id===id); if(!r) return;
  state.editingId = id;
  populateFormSelects();
  document.getElementById("fDate").value = r.date;
  document.getElementById("fMileage").value = r.mileage;
  document.getElementById("fCategory").value = r.category;
  document.getElementById("fCost").value = r.cost;
  document.getElementById("fServiceId").value = r.serviceId || "";
  document.getElementById("fTitle").value = r.title;
  document.getElementById("fNotes").value = r.notes || "";
  document.getElementById("formTitle").textContent = "Редактировать";
  document.getElementById("btnSubmit").textContent = "Сохранить";
  document.getElementById("formModal").classList.remove("hidden");
}

function deleteRecord(id) {
  state.records = state.records.filter(r=>r.id!==id);
  if (state.expandedRecId===id) state.expandedRecId=null;
  render();
}

function submitForm() {
  const title = document.getElementById("fTitle").value.trim();
  const mileage = parseInt(document.getElementById("fMileage").value);
  if (!title || !mileage) return;
  const rec = {
    date: document.getElementById("fDate").value,
    mileage,
    category: document.getElementById("fCategory").value,
    cost: parseFloat(document.getElementById("fCost").value) || 0,
    serviceId: document.getElementById("fServiceId").value,
    title,
    notes: document.getElementById("fNotes").value.trim(),
  };
  if (state.editingId) {
    state.records = state.records.map(r => r.id===state.editingId ? {...r,...rec} : r);
  } else {
    state.records.unshift({id:Date.now(),...rec});
  }
  if (mileage > state.currentMileage) state.currentMileage = mileage;
  closeForm(); render();
}

function addFromSchedule(svcId) {
  const svc = SERVICE_SCHEDULE.find(s=>s.id===svcId); if(!svc) return;
  const cat = CATEGORIES.find(c=>c.id===svc.group) ? svc.group : "other";
  openForm({ category:cat, title:svc.name, notes:svc.note, serviceId:svc.id });
}

// Init
render();
</script>
</body>
</html>
